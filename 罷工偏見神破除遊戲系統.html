<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>罷工偏見神破除遊戲系統</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="透過互動遊戲辨識社會對罷工行為的誤解與真實法律規範，破除迷思，建立正確勞權觀。">
    <meta name="author" content="Liyuchiutiger Gongminshen">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --bg-color: #f5f6fa;
            --c-myth: #e74c3c; /* 紅色代表偏見/警示 */
            --c-fact: #2ecc71; /* 綠色代表事實/正解 */
            --c-gold: #f39c12;
            --c-panel: #ffffff;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: #333;
            font-family: 'Noto Sans TC', 'Outfit', sans-serif;
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 20px 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 100;
        }

        h1 { font-size: clamp(1.2rem, 5vw, 1.8rem); font-weight: 900; }

        .instruction-bar {
            background: #fff;
            padding: 12px;
            font-size: 0.95rem;
            color: #666;
            border-bottom: 1px solid #eee;
            text-align: center;
            border-left: 5px solid var(--c-myth);
        }

        .game-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            padding: 20px;
            position: relative;
        }

        .card-container {
            width: 100%;
            max-width: 650px;
            height: 220px;
            perspective: 1000px;
            position: relative;
            z-index: 10;
        }

        .case-card {
            width: 100%;
            height: 100%;
            background: var(--c-panel);
            border: 1px solid #ddd;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px 40px;
            box-shadow: var(--shadow);
            cursor: grab;
            transition: transform 0.1s, box-shadow 0.3s;
            user-select: none;
            touch-action: none;
        }

        .case-card:active { cursor: grabbing; }
        .case-card.dragging {
            opacity: 0.9;
            transform: scale(1.05);
            z-index: 100;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .case-icon { font-size: 2.5rem; margin-bottom: 15px; color: var(--c-gold); }
        .case-text { font-size: clamp(1rem, 4vw, 1.35rem); font-weight: 700; line-height: 1.6; color: var(--primary-color); }

        .zones-container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 20px;
        }

        .drop-zone {
            height: 200px;
            border-radius: 25px;
            background: #fff;
            border: 3px dashed #ccc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 20px;
            text-align: center;
        }

        .h-myth { border-color: var(--c-myth); }
        .h-fact { border-color: var(--c-fact); }

        .drop-zone.hover { transform: scale(1.05); }
        .drop-zone.hover.h-myth { background-color: rgba(231, 76, 60, 0.08); box-shadow: 0 0 30px rgba(231, 76, 60, 0.2); }
        .drop-zone.hover.h-fact { background-color: rgba(46, 204, 113, 0.08); box-shadow: 0 0 30px rgba(46, 204, 113, 0.2); }

        .zone-icon { font-size: 3rem; margin-bottom: 12px; }
        .h-myth .zone-icon { color: var(--c-myth); }
        .h-fact .zone-icon { color: var(--c-fact); }

        .zone-label { font-weight: 900; font-size: 1.6rem; color: var(--primary-color); letter-spacing: 2px; }
        .zone-desc { font-size: 0.9rem; color: #888; margin-top: 8px; }

        .game-stats { position: fixed; top: 140px; right: 40px; z-index: 5; }
        .stat-item { background: #fff; padding: 12px 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-right: 5px solid var(--c-gold); margin-bottom: 15px; text-align: right; }
        .stat-label { font-size: 0.8rem; font-weight: 700; color: #999; }
        .stat-value { font-size: 2.2rem; font-weight: 900; color: var(--primary-color); font-family: 'Outfit'; }

        .feedback-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(8px); }
        .feedback-content { background: #fff; padding: 45px; border-radius: 35px; max-width: 650px; width: 90%; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.4); animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .feedback-title { font-size: 2.5rem; font-weight: 900; margin-bottom: 25px; }
        .feedback-text { font-size: 1.2rem; line-height: 1.8; margin-bottom: 35px; color: #333; text-align: left; background: #f4f7f6; padding: 25px; border-radius: 20px; border-left: 10px solid var(--c-fact); }
        
        .btn-next { background: var(--primary-color); color: #fff; border: none; padding: 18px 60px; border-radius: 50px; font-weight: 900; font-size: 1.2rem; cursor: pointer; transition: var(--transition); }
        .btn-next:hover { transform: translateY(-3px); filter: brightness(1.2); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }

        footer {
            background-color: var(--primary-color);
            color: #bdc3c7;
            text-align: center;
            padding: 30px 0;
            margin-top: auto;
            font-size: 14px;
        }

        .footer-link {
            display: inline-block;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            margin-bottom: 10px;
            transition: var(--transition);
        }

        .footer-link:hover {
            color: var(--c-gold);
            transform: translateY(-5px) scale(1.05);
            background: rgba(255, 255, 255, 0.05);
            text-shadow: 0 0 20px rgba(243, 156, 18, 0.6);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        #mascot { position: fixed; bottom: 65px; left: 35px; width: 110px; z-index: 20; cursor: move; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1)); transition: transform 0.3s; }
        #mascot:hover { transform: scale(1.1) rotate(-5deg); }

        @media (max-width: 850px) {
            .zones-container { grid-template-columns: 1fr; gap: 20px; }
            .drop-zone { height: 140px; }
            .game-stats { position: relative; top: 0; right: 0; display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; }
            .stat-item { padding: 8px 15px; margin-bottom: 0; }
            .stat-value { font-size: 1.8rem; }
            #mascot { display: none; }
        }
    </style>
</head>
<body>
    <header>
        <h1><i class="fas fa-hand-back-fist"></i> 罷工偏見神破除遊戲系統</h1>
    </header>

    <div class="instruction-bar">
        請閱讀案例卡片中的敘述，判斷其屬於社會常見的「偏見」或是受法律保障的「事實」。

    <div class="game-stats">
        <div class="stat-item">
            <p class="stat-label">進度</p>
            <p class="stat-value" id="progress">1/16</p>

            <p class="stat-label">得分</p>

    <main class="game-main">
        <div class="card-container">
            <div id="case-card" class="case-card">
                <div class="case-icon"><i class="fas fa-comment-slash"></i></div>

        <div class="zones-container">
            <div id="zone-myth" class="drop-zone h-myth" data-type="myth">
                <i class="fas fa-face-angry zone-icon"></i>
                <div class="zone-label">這是偏見</div>
                <div class="zone-desc">對個人或集體勞權的誤解與抹黑</div>
            </div>
            <div id="zone-fact" class="drop-zone h-fact" data-type="fact">
                <i class="fas fa-scale-balanced zone-icon"></i>

    </main>

    <div id="feedback-overlay" class="feedback-overlay">
        <div class="feedback-content">
            <div id="feedback-title" class="feedback-title">正確！</div>
            <div id="feedback-text" class="feedback-text">解說內容...</div>
            <button id="btn-next" class="btn-next">查看下一個 <i class="fas fa-chevron-right"></i></button>

    </div>

    <footer>
        <div class="footer-links">
            <a href="https://www.facebook.com/happyliyuchilltiger/" target="_blank" class="footer-link">
                <i class="fab fa-facebook"></i> 快樂鯉魚秋老虎
            </a>
        </div>
        <p>Copyright © Liyuchiutiger Gongminshen</p>
    </footer>

    <img src="image/LiyuChillGuy.svg" id="mascot" alt="Mascot">

    <script>
        const originalCases = [
            // 偏見 (Myth)
            { 
                text: "罷工都是違法的鬧事行為，勞工應該乖乖聽從雇主的指揮，社會才不會亂。", 
                type: "myth", 
                icon: "fa-gavel", 
                exp: "【偏見破除】霸工是憲法保障的集體權利。勞資關係並非絕對從屬，而是在對等談判下建立秩序。只要符合法定程序（如調解、投票），罷工是合法的實力展現。" 
            },
            { 
                text: "工會領袖只要看老闆不爽，隨便吼一聲明天就可以號召大家在那邊罷工。", 
                type: "myth", 
                icon: "fa-megaphone", 
                exp: "【偏見破除】罷工程序極其嚴謹。在台灣，工會必須先經過勞資爭議調解不成立，並由全體會員進行無記名投票、過半數同意後，才能合法罷工。" 
            },
            { 
                text: "罷工的人一定都很自私、很貪婪，只想要威脅公司多給他們錢，完全不顧公司死活。", 
                type: "myth", 
                icon: "fa-comments-dollar", 
                exp: "【偏見破除】罷工通常是針對「制度性問題」的最後手段。多數罷工是為了爭取安全的工作環境、防止過勞（下班權）、提升服務品質或維護職場尊嚴。" 
            },
            { 
                text: "罷工只會短暫造成民眾不便，除了讓大家討厭勞工之外，對整體社會毫無幫助。", 
                type: "myth", 
                icon: "fa-users-slash", 
                exp: "【偏見破除】罷工展示了勞動的真實價值。透過罷工提升的勞動條件，往往能帶動整個產業的待遇基準，減少整體社會的過勞負擔、提升公共服務安全。" 
            },
            { 
                text: "只要大家講好明天一起請假不去上班，這種集體不出勤的行為就自動被法律定義為罷工。", 
                type: "myth", 
                icon: "fa-calendar-day", 
                exp: "【偏見破除】「自發性集体休假」並不等於法律上的罷工。合法罷工必須由登記有案的『工會』發起，且遵守一系列法定協商與投票流程，否則可能面臨法律風險。" 
            },
            { 
                text: "罷工期間勞工絕對不可以佔據廠房或在公司門口阻擋，那是犯法的暴力行為。", 
                type: "myth", 
                icon: "fa-lock", 
                exp: "【偏見破除】工會法保障「糾察線」的設置。在不訴諸暴力與強制行為的前提下，勞工可在出入口進行勸阻與宣導，這是罷工權行使中必要的輔助手段。" 
            },
            { 
                text: "罷工會嚴重損害國家經濟競爭力，愛國的勞工不應該跟政府或企業對抗。", 
                type: "myth", 
                icon: "fa-earth-asia", 
                exp: "【偏見破除】健康的勞資對話（包括罷工）能促進企業長期穩定的治理。缺乏抗爭權力的國家，勞工往往淪為低薪過勞的犧牲品，反而不利於高品質的發展。" 
            },
            { 
                text: "罷工的人一定都不愛自己的公司，所以才想把公司內部搞得天翻地覆、想搞垮公司。", 
                type: "myth", 
                icon: "fa-heart-crack", 
                exp: "【偏見破除】勞工通常是因為「在乎」才抗爭。若完全不愛公司，通常會選擇直接離職。集體抗爭是希望能改善公司內部的不合理對待，謀求長遠的勞資共榮。" 
            },

            // 事實 (Fact)
            { 
                text: "罷工是《憲法》與《工會法》保障的集體權利，是一種為了促成對等談判而存在的法定實力展現手段。", 
                type: "fact", 
                icon: "fa-book-open", 
                exp: "【正確事實】憲法保障結社權與勞動權。由於個別勞工與雇主實力不對等，法律特許勞工團結行使爭議權，以平衡權力差距。" 
            },
            { 
                text: "合法的罷工行動，勞工對於雇主因停工所受到的業務損害，享有民事與刑事的免責權。", 
                type: "fact", 
                icon: "fa-shield-halved", 
                exp: "【正確事實】這是爭議權的核心保障。若罷工程序合法，勞工免除因停工造成的契約違約責任。反之，若非法罷工，則可能面臨雇主求償。" 
            },
            { 
                text: "罷工的目的通常是為了達成「團體協約」，爭取比法律基準更好的勞動條件、工時或安全基準。", 
                type: "fact", 
                icon: "fa-handshake", 
                exp: "【正確事實】罷工非目的，協商才是。罷工是為了迫使雇主回到談判桌，最終雙方簽署具法律效力的團體協約，穩定勞資關係。" 
            },
            { 
                text: "罷工期間雇主不可以因為員工參加工會活動或罷工，而隨意將員工開除或予以歧視性對待。", 
                type: "fact", 
                icon: "fa-user-check", 
                exp: "【正確事實】法律禁止「不當勞動行為」。雇主不得因參與合法罷工而解僱勞工，這在救濟程序中會被視為違法且無效的懲處。" 
            },
            { 
                text: "在台灣發動罷工前，必須先經過勞工局處的「調解程序」，若調解不成立，才能進一步準備罷工。", 
                type: "fact", 
                icon: "fa-balance-scale-right", 
                exp: "【正確事實】這是「罷工冷靜期」的設計。法律強制雙方先坐下來談（調解），談不攏才能動用最後武力解決爭議。" 
            },
            { 
                text: "罷工期間工會可以在不涉及非法行為下，設置「糾察線」勸導其他員工或合作夥伴不要進入廠區。", 
                type: "fact", 
                icon: "fa-person-shield", 
                exp: "【正確事實】糾察線是增強罷工效果的合法方式。透過拉起糾察線與標語宣導，爭取更多同儕與社會支持，是爭議行為的一環。" 
            },
            { 
                text: "罷工案例（如機師罷工）往往引發大眾對「過勞與飛安」的討論，其實這有利於提升整體公共服務的安全標準。", 
                type: "fact", 
                icon: "fa-life-ring", 
                exp: "【正確事實】集體勞權的進步往往惠及全體。例如護理師罷工是為了護病比，當護理師不再過勞，醫療品質與病患安全才能獲得保障。" 
            },
            { 
                text: "勞工有權罷工，但也需在法律框架下並遵守誠信原則，這是一種權利與法治責任並行的成熟制度。", 
                type: "fact", 
                icon: "fa-user-graduate", 
                exp: "【正確事實】民主社會尊重罷工，是因為它將勞資衝突導向制度化。在法規範內的抗爭，比地下化的衝突更能穩定長期的社會發展。" 
            }
        ];

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        let cases = shuffle([...originalCases]);
        let currentIndex = 0;
        let score = 0;
        let isComplete = false;

        const card = document.getElementById('case-card');
        const cardText = document.getElementById('case-text');
        const cardIcon = document.querySelector('.case-icon i');
        const zones = document.querySelectorAll('.drop-zone');
        const feedbackOverlay = document.getElementById('feedback-overlay');
        const feedbackTitle = document.getElementById('feedback-title');
        const feedbackText = document.getElementById('feedback-text');
        const btnNext = document.getElementById('btn-next');
        const scoreVal = document.getElementById('score');
        const progressVal = document.getElementById('progress');

        function updateGame() {
            if (currentIndex >= cases.length) {
                showFinalResults();
                return;
            }
            const c = cases[currentIndex];
            cardText.innerText = c.text;
            cardIcon.className = `fas ${c.icon}`;
            progressVal.innerText = `${currentIndex + 1}/${cases.length}`;
            card.style.transform = `translate(0, 0)`;
            card.style.opacity = '1';
        }

        function showFinalResults() {
            isComplete = true;
            feedbackOverlay.style.display = 'flex';
            feedbackTitle.innerText = "🎊 偏見成功破除！";
            feedbackTitle.style.color = "var(--c-fact)";
            feedbackText.innerText = `你在 ${cases.length} 個案例中準確辨識了 ${score} 個觀念！\n你現在擁有獨立思考、不受抹黑影響的勞動素養了！`;
            btnNext.innerText = "回首頁";
            btnNext.onclick = () => window.location.href = 'index.html';
        }

        let startX, startY;
        let currentX = 0, currentY = 0;
        let dragging = false;

        card.addEventListener('mousedown', startDrag);
        card.addEventListener('touchstart', startDrag, { passive: false });

        function startDrag(e) {
            if (isComplete) return;
            dragging = true;
            card.classList.add('dragging');
            const touch = e.type === 'touchstart' ? e.touches[0] : e;
            startX = touch.clientX;
            startY = touch.clientY;
            document.addEventListener('mousemove', handleMove);
            document.addEventListener('touchmove', handleMove, { passive: false });
            document.addEventListener('mouseup', stopDrag);
            document.addEventListener('touchend', stopDrag);
        }

        function handleMove(e) {
            if (!dragging) return;
            if (e.type === 'touchmove') e.preventDefault();
            const touch = e.type === 'touchmove' ? e.touches[0] : e;
            currentX = touch.clientX - startX;
            currentY = touch.clientY - startY;
            card.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${currentX * 0.05}deg)`;
            checkHover(touch.clientX, touch.clientY);
        }

        function checkHover(x, y) {
            zones.forEach(zone => {
                const rect = zone.getBoundingClientRect();
                if (x > rect.left && x < rect.right && y > rect.top && y < rect.bottom) {
                    zone.classList.add('hover');
                } else {
                    zone.classList.remove('hover');
                }
            });
        }

        function stopDrag(e) {
            if (!dragging) return;
            dragging = false;
            card.classList.remove('dragging');
            document.removeEventListener('mousemove', handleMove);
            document.removeEventListener('touchmove', handleMove);

            const dropTarget = Array.from(zones).find(z => z.classList.contains('hover'));
            if (dropTarget) {
                const result = dropTarget.getAttribute('data-type');
                checkAnswer(result);
            } else {
                card.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                card.style.transform = `translate(0, 0)`;
            }
            zones.forEach(z => z.classList.remove('hover'));
        }

        let selectedWrong = false;

        function checkAnswer(answer) {
            const correctType = cases[currentIndex].type;
            const isCorrect = answer === correctType;
            feedbackOverlay.style.display = 'flex';
            if (isCorrect) {
                if (!selectedWrong) {
                    score++;
                    scoreVal.innerText = score;
                }
                feedbackTitle.innerText = "答對了！";
                feedbackTitle.style.color = "var(--c-fact)";
                feedbackText.style.borderLeftColor = "var(--c-fact)";
                btnNext.innerText = "查看下一個";
                btnNext.onclick = () => {
                    feedbackOverlay.style.display = 'none';
                    currentIndex++;
                    selectedWrong = false;
                    updateGame();
                };
            } else {
                selectedWrong = true;
                feedbackTitle.innerText = "喔喔，差了一些！";
                feedbackTitle.style.color = "var(--c-myth)";
                feedbackText.style.borderLeftColor = "var(--c-myth)";
                btnNext.innerText = "再試看看";
                btnNext.onclick = () => {
                    feedbackOverlay.style.display = 'none';
                };
            }
            feedbackText.innerText = cases[currentIndex].exp;
        }

        const mascot = document.getElementById('mascot');
        let mIsDragging = false;
        let mStartX, mStartY, mStartLeft, mStartTop;

        mascot.addEventListener('mousedown', (e) => {
            mIsDragging = true;
            mStartX = e.clientX;
            mStartY = e.clientY;
            const rect = mascot.getBoundingClientRect();
            mStartLeft = rect.left;
            mStartTop = rect.top;
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!mIsDragging) return;
            const dx = e.clientX - mStartX;
            const dy = e.clientY - mStartY;
            mascot.style.left = (mStartLeft + dx) + 'px';
            mascot.style.top = (mStartTop + dy) + 'px';
            mascot.style.bottom = 'auto';
        });

        document.addEventListener('mouseup', () => mIsDragging = false);

        updateGame();
    </script>
</body>
</html>
