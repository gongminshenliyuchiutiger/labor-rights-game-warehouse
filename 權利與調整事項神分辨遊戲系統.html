<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>權利與調整事項神分辨遊戲系統</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="透過互動遊戲學習分辨勞動權益中的權利事項與調整事項，掌握勞動教育核心知識。">
    <meta name="author" content="Liyuchiutiger Gongminshen">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #34495e;
            --bg-color: #f5f6fa;
            --c-rights: #3498db;
            --c-adjustment: #e67e22;
            --c-gold: #f39c12;
            --c-panel: #ffffff;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: #333;
            font-family: 'Noto Sans TC', 'Outfit', sans-serif;
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Header --- */
        header {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 20px 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 100;
        }

        footer {
            background-color: var(--primary-color);
            color: #bdc3c7;
            text-align: center;
            padding: 30px 0;
            margin-top: auto;
            font-size: 14px;
        }

        .footer-link {
            display: inline-block;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            margin-bottom: 10px;
            transition: var(--transition);
        }

        .footer-link:hover {
            color: var(--c-gold);
            transform: translateY(-5px) scale(1.05);
            background: rgba(255, 255, 255, 0.05);
            text-shadow: 0 0 20px rgba(243, 156, 18, 0.6);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        #mascot { position: fixed; bottom: 65px; left: 35px; width: 110px; z-index: 20; cursor: move; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1)); transition: transform 0.3s; }

        h1 {
            font-size: 1.8rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: 1px;
        }

        .instruction-bar {
            background: #fff;
            padding: 12px;
            font-size: 0.95rem;
            color: #666;
            border-bottom: 1px solid #eee;
            text-align: center;
            border-left: 5px solid var(--c-rights);
        }

        /* --- 遊戲主區域 --- */
        .game-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            padding: 20px;
            position: relative;
        }

        /* 案例卡片區域 */
        .card-container {
            width: 100%;
            max-width: 500px;
            height: 250px;
            perspective: 1000px;
            position: relative;
            z-index: 10;
        }

        .case-card {
            width: 100%;
            height: 100%;
            background: var(--c-panel);
            border: 1px solid #ddd;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px;
            box-shadow: var(--shadow);
            cursor: grab;
            transition: transform 0.1s, box-shadow 0.3s;
            user-select: none;
            touch-action: none;
        }

        .case-card:active {
            cursor: grabbing;
        }

        .case-card.dragging {
            opacity: 0.9;
            transform: scale(1.05);
            z-index: 100;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .case-icon {
            font-size: 3.5rem;
            margin-bottom: 20px;
            color: var(--c-gold);
        }

        .case-text {
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1.4;
            color: var(--primary-color);
        }

        /* 分類桶區域 */
        .zones-container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 40px;
        }

        .drop-zone {
            height: 180px;
            border-radius: 20px;
            background: #fff;
            border: 2px dashed #ccc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .drop-zone.h-rights { border-color: var(--c-rights); }
        .drop-zone.h-adjustment { border-color: var(--c-adjustment); }

        .drop-zone.hover {
            transform: scale(1.05);
            background: #fcfcfc;
        }

        .drop-zone.hover.h-rights { 
            box-shadow: 0 0 20px rgba(52, 152, 219, 0.2); 
            background-color: rgba(52, 152, 219, 0.05);
        }
        .drop-zone.hover.h-adjustment { 
            box-shadow: 0 0 20px rgba(230, 126, 34, 0.2); 
            background-color: rgba(230, 126, 34, 0.05);
        }

        .zone-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            transition: var(--transition);
        }

        .h-rights .zone-icon { color: var(--c-rights); }
        .h-adjustment .zone-icon { color: var(--c-adjustment); }

        .zone-label {
            font-weight: 900;
            font-size: 1.3rem;
            letter-spacing: 2px;
            color: var(--primary-color);
        }

        .zone-desc {
            font-size: 0.85rem;
            color: #888;
            margin-top: 5px;
        }

        /* --- 得分與進度 --- */
        .game-stats {
            position: fixed;
            top: 150px;
            right: 40px;
            text-align: right;
            z-index: 5;
        }

        .stat-item {
            margin-bottom: 20px;
            background: #fff;
            padding: 10px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-right: 4px solid var(--c-rights);
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            color: #999;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--primary-color);
            font-family: 'Outfit';
        }

        /* --- 反饋區域 --- */
        .feedback-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .feedback-content {
            background: #fff;
            padding: 40px;
            border-radius: 30px;
            max-width: 550px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop-in {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .feedback-title {
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 20px;
        }

        .feedback-text {
            font-size: 1.15rem;
            line-height: 1.8;
            margin-bottom: 30px;
            color: #555;
            text-align: left;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 15px;
            border-left: 5px solid var(--c-rights);
        }

        .btn-next {
            background: var(--primary-color);
            color: #fff;
            border: none;
            padding: 15px 50px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-next:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            filter: brightness(1.2);
        }

        /* --- Footer --- */
        footer {
            background-color: var(--primary-color);
            color: #bdc3c7;
            text-align: center;
            padding: 15px 0;
            font-size: 14px;
            margin-top: auto;
        }

        /* --- 吉祥物 --- */
        #mascot {
            position: fixed;
            bottom: 60px;
            left: 30px;
            width: 120px;
            z-index: 20;
            cursor: move;
            transition: transform 0.3s;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }

        #mascot:hover {
            transform: scale(1.1) rotate(5deg);
        }

        /* --- 響應式 --- */
        @media (max-width: 768px) {
            .zones-container {
                grid-template-columns: 1fr;
                gap: 15px;
                padding: 0 20px;
            }
            .drop-zone { height: 120px; }
            .case-card { height: 200px; padding: 20px; }
            .case-text { font-size: 1.1rem; }
            .game-stats { 
                position: relative; 
                top: 0; right: 0; 
                display: flex; 
                justify-content: center; 
                gap: 20px; 
                margin-bottom: 10px;
            }
            .stat-item { margin-bottom: 0; padding: 5px 15px; }
            .stat-value { font-size: 1.5rem; }
            #mascot { display: none; }
        }
    </style>
</head>
<body>
    <header>
        <h1><i class="fas fa-scale-unbalanced-flip"></i> 權利與調整事項神分辨遊戲系統</h1>
    </header>

    <div class="instruction-bar">
        判斷中央案例卡片屬於「權利事項」或「調整事項」，將其拖入正確的分類區域。
    </div>

    <div class="game-stats">
        <div class="stat-item">
            <p class="stat-label">進度</p>
            <p class="stat-value" id="progress">1/20</p>
        </div>
        <div class="stat-item" style="border-right-color: var(--c-adjustment);">
            <p class="stat-label">得分</p>
            <p class="stat-value" id="score">0</p>
        </div>
    </div>

    <main class="game-main">
        <div class="card-container">
            <div id="case-card" class="case-card">
                <div class="case-icon"><i class="fas fa-money-bill-wave"></i></div>
                <div class="case-text" id="case-text">老闆沒付加班費</div>
            </div>
        </div>

        <div class="zones-container">
            <div id="zone-rights" class="drop-zone h-rights" data-type="rights">
                <i class="fas fa-scale-balanced zone-icon"></i>
                <div class="zone-label">權利事項</div>
                <div class="zone-desc">基於法律、合約既有之權利</div>
            </div>
            <div id="zone-adjustment" class="drop-zone h-adjustment" data-type="adjustment">
                <i class="fas fa-handshake-angle zone-icon"></i>
                <div class="zone-label">調整事項</div>
                <div class="zone-desc">爭取更好的勞動條件與福利</div>
            </div>
        </div>
    </main>

    <div id="feedback-overlay" class="feedback-overlay">
        <div class="feedback-content">
            <div id="feedback-title" class="feedback-title">正確！</div>
            <div id="feedback-text" class="feedback-text">解說內容...</div>
            <button id="btn-next" class="btn-next">下一個案例 <i class="fas fa-chevron-right"></i></button>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="https://www.facebook.com/happyliyuchilltiger/" target="_blank" class="footer-link">
                <i class="fab fa-facebook"></i> 快樂鯉魚秋老虎
            </a>
        </div>
        <p>Copyright © Liyuchiutiger Gongminshen</p>
    </footer>

    <img src="image/LiyuChillGuy.svg" id="mascot" alt="Mascot" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/4/47/React.svg'">

    <script>
        const originalCases = [
            { text: "老闆沒付加班費", type: "rights", icon: "fa-money-bill-wave", exp: "【權利事項】是指基於法律或合約已經產生的權利。老闆不支薪是違反《勞基法》的行為，屬於權利事項爭議。" },
            { text: "工會要求明年調薪 5%", type: "adjustment", icon: "fa-arrow-trend-up", exp: "【調整事項】是指爭取改變或創設新的勞動條件。加薪屬於改善待遇，並非法規明定之權利，屬於調整事項。" },
            { text: "女員工產後遭違法解雇", type: "rights", icon: "fa-person-breastfeeding", exp: "【權利事項】違反《勞基法》或《性平法》之明文規定（如產假保障），屬於既有權利之受損，故為權利事項。" },
            { text: "爭取額外增加特別休假", type: "adjustment", icon: "fa-umbrella-beach", exp: "【調整事項】爭取優於法律規定的休假天數是為了創設更好的條件，屬於調整事項爭議。" },
            { text: "雇主未依法投保勞保", type: "rights", icon: "fa-shield-halved", exp: "【權利事項】雇主未履行法律強制義務。投保是法律規定的權利，受損時屬於權利事項。" },
            { text: "改善員工休息室設備", type: "adjustment", icon: "fa-couch", exp: "【調整事項】改善勞動環境、硬體設備並非法律強制，屬於勞資雙方協議變更條件的調整事項。" },
            { text: "退休金金額計算錯誤", type: "rights", icon: "fa-calculator", exp: "【權利事項】基於法律規定的計算公式所得出的金額受損，屬於維護既有權利的爭議。" },
            { text: "爭取彈性上下班時間", type: "adjustment", icon: "fa-clock-rotate-left", exp: "【調整事項】彈性工時並非法定權利，而是屬於勞資協商創設新制度的範疇，故為調整事項。" },
            { text: "要求增加年終獎金比例", type: "adjustment", icon: "fa-sack-dollar", exp: "【調整事項】年終獎金除契約另有約定外，多屬優於法令的獎勵，爭取增加比例屬於調整事項。" },
            { text: "老闆片面更動班表導致未給例假", type: "rights", icon: "fa-calendar-xmark", exp: "【權利事項】《勞基法》規定每七日應有二日之休息（一例一休），違反此規定損害法定權利，屬於權利事項。" },
            { text: "爭取公司分配盈餘紅利", type: "adjustment", icon: "fa-coins", exp: "【調整事項】盈餘紅利的分配標準屬於勞資雙方對於利潤分享的協議，不具法定強制性，為調整事項。" },
            { text: "遭資遣卻未領到法定資遣費", type: "rights", icon: "fa-hand-holding-dollar", exp: "【權利事項】資遣費是《勞基法》或《勞退條例》明定的法定保障，未依法發給屬於權利受損。" },
            { text: "要求縮短法定工時至 35 小時", type: "adjustment", icon: "fa-hourglass-half", exp: "【調整事項】現行法規為週休二日 40 小時，爭取更少的工作時數是為了改善條件，屬於調整事項。" },
            { text: "雇主違反競業禁止補償約定", type: "rights", icon: "fa-file-contract", exp: "【權利事項】若契約中約定競業禁止補償，雇主未履行即為違反契約約定之權利事項。" },
            { text: "要求提供更好的午餐補貼", type: "adjustment", icon: "fa-bowl-food", exp: "【調整事項】伙食津貼除契約約定外，爭取提高金額屬於福利條件的變更，為調整事項。" },
            { text: "加班時未給予法定休息時間", type: "rights", icon: "fa-battery-empty", exp: "【權利事項】法律規定工作一定時間應有休息時間，違反此勞動保護規範屬於權利事項。" },
            { text: "爭取辦公室設置托兒設施", type: "adjustment", icon: "fa-baby-carriage", exp: "【調整事項】除非符合法律強制設置標準，否則爭取優於法令的育兒設施屬於調整事項。" },
            { text: "特休假遭雇主無故拒絕排定", type: "rights", icon: "fa-plane-departure", exp: "【權利事項】《勞基法》規定特別休假期日應由勞工排定，雇主不得無故回絕，此為權利受損之爭議。" },
            { text: "爭取工會辦公室空間", type: "adjustment", icon: "fa-building-user", exp: "【調整事項】提供工會辦公空間是基於勞資雙方誠意協商的結果，非法律強制之權利，屬調整事項。" },
            { text: "颱風天出勤未依合約給加倍薪", type: "rights", icon: "fa-wind", exp: "【權利事項】若勞資契約已有明確約定天災出勤給予加倍薪資，雇主未執行即為違反契約之權利事項。" }
        ];

        // 題目隨機化 (Fisher-Yates Shuffle)
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        let cases = shuffle([...originalCases]);
        let currentIndex = 0;
        let score = 0;
        let isComplete = false;

        const card = document.getElementById('case-card');
        const cardText = document.getElementById('case-text');
        const cardIcon = document.querySelector('.case-icon i');
        const zones = document.querySelectorAll('.drop-zone');
        const feedbackOverlay = document.getElementById('feedback-overlay');
        const feedbackTitle = document.getElementById('feedback-title');
        const feedbackText = document.getElementById('feedback-text');
        const btnNext = document.getElementById('btn-next');
        const scoreVal = document.getElementById('score');
        const progressVal = document.getElementById('progress');

        function updateGame() {
            if (currentIndex >= cases.length) {
                showFinalResults();
                return;
            }
            const c = cases[currentIndex];
            cardText.innerText = c.text;
            cardIcon.className = `fas ${c.icon}`;
            progressVal.innerText = `${currentIndex + 1}/${cases.length}`;
            
            card.style.transition = 'none';
            card.style.transform = `translate(0, 0)`;
            card.style.opacity = '1';
            
            // 觸發重繪
            void card.offsetWidth;
        }

        function showFinalResults() {
            isComplete = true;
            feedbackOverlay.style.display = 'flex';
            feedbackTitle.innerText = "🎊 挑戰完成！";
            feedbackTitle.style.color = "var(--c-gold)";
            feedbackText.innerText = `你在 ${cases.length} 個案例中正確分辨了 ${score} 個！\n你已經成為勞權分辨神了！`;
            btnNext.innerText = "回首頁";
            btnNext.onclick = () => window.location.href = 'index.html';
        }

        // --- 拖曳邏輯 ---
        let startX, startY;
        let currentX = 0, currentY = 0;
        let dragging = false;

        card.addEventListener('mousedown', startDrag);
        card.addEventListener('touchstart', startDrag, { passive: false });

        function startDrag(e) {
            if (isComplete) return;
            dragging = true;
            card.classList.add('dragging');
            const touch = e.type === 'touchstart' ? e.touches[0] : e;
            startX = touch.clientX;
            startY = touch.clientY;
            
            document.addEventListener('mousemove', handleMove);
            document.addEventListener('touchmove', handleMove, { passive: false });
            document.addEventListener('mouseup', stopDrag);
            document.addEventListener('touchend', stopDrag);
        }

        function handleMove(e) {
            if (!dragging) return;
            if (e.type === 'touchmove') e.preventDefault();
            const touch = e.type === 'touchmove' ? e.touches[0] : e;
            currentX = touch.clientX - startX;
            currentY = touch.clientY - startY;
            card.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${currentX * 0.05}deg)`;

            checkHover(touch.clientX, touch.clientY);
        }

        function checkHover(x, y) {
            zones.forEach(zone => {
                const rect = zone.getBoundingClientRect();
                if (x > rect.left && x < rect.right && y > rect.top && y < rect.bottom) {
                    zone.classList.add('hover');
                } else {
                    zone.classList.remove('hover');
                }
            });
        }

        function stopDrag(e) {
            if (!dragging) return;
            dragging = false;
            card.classList.remove('dragging');
            document.removeEventListener('mousemove', handleMove);
            document.removeEventListener('touchmove', handleMove);

            const dropTarget = Array.from(zones).find(z => z.classList.contains('hover'));
            if (dropTarget) {
                const result = dropTarget.getAttribute('data-type');
                checkAnswer(result);
            } else {
                card.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                card.style.transform = `translate(0, 0)`;
            }
            zones.forEach(z => z.classList.remove('hover'));
        }

        let selectedWrong = false;

        function checkAnswer(answer) {
            const correctType = cases[currentIndex].type;
            const isCorrect = answer === correctType;

            feedbackOverlay.style.display = 'flex';
            if (isCorrect) {
                if (!selectedWrong) {
                    score++;
                    scoreVal.innerText = score;
                }
                feedbackTitle.innerText = "正確！";
                feedbackTitle.style.color = "var(--c-rights)";
                btnNext.innerText = "下一個案例";
                btnNext.onclick = () => {
                    feedbackOverlay.style.display = 'none';
                    currentIndex++;
                    selectedWrong = false;
                    updateGame();
                };
            } else {
                selectedWrong = true;
                feedbackTitle.innerText = "喔喔，差了一些！";
                feedbackTitle.style.color = "var(--c-adjustment)";
                btnNext.innerText = "再試看看";
                btnNext.onclick = () => {
                    feedbackOverlay.style.display = 'none';
                };
            }
            feedbackText.innerText = cases[currentIndex].exp;
        }

        // --- 吉祥物可移動化 ---
        const mascot = document.getElementById('mascot');
        let mIsDragging = false;
        let mStartX, mStartY, mStartLeft, mStartTop;

        mascot.addEventListener('mousedown', (e) => {
            mIsDragging = true;
            mStartX = e.clientX;
            mStartY = e.clientY;
            const rect = mascot.getBoundingClientRect();
            mStartLeft = rect.left;
            mStartTop = rect.top;
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!mIsDragging) return;
            const dx = e.clientX - mStartX;
            const dy = e.clientY - mStartY;
            mascot.style.left = (mStartLeft + dx) + 'px';
            mascot.style.top = (mStartTop + dy) + 'px';
            mascot.style.bottom = 'auto';
        });

        document.addEventListener('mouseup', () => mIsDragging = false);

        // 初始化
        updateGame();

    </script>
</body>
</html>
